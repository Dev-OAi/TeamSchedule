name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "jules-3718682231532007249-69e4f548"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject Password
        run: |
          # Use a secret for the password. User should set APP_PASSWORD secret to VLY
          # Fallback to VLY if secret is not set (for convenience, though less secure)
          PASSWORD="${{ secrets.APP_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then PASSWORD="VLY"; fi
          sed -i "s/%%APP_PASSWORD%%/$PASSWORD/g" js/app.js
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
