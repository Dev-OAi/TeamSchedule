<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Leave Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .nav-item.active {
            --tw-bg-opacity: 1;
            background-color: rgb(37 99 235 / var(--tw-bg-opacity));
            --tw-text-opacity: 1;
            color: rgb(255 255 255 / var(--tw-text-opacity));
            --tw-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --tw-shadow-colored: 0 4px 6px -1px var(--tw-shadow-color), 0 2px 4px -2px var(--tw-shadow-color);
            box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
        }
        .nav-item:not(.active) {
            color: rgb(75 85 99);
        }
        .nav-item:not(.active):hover {
            background-color: rgb(229 231 235);
            color: rgb(31 41 55);
        }
        .sticky-col {
            position: sticky;
            left: 0;
            z-index: 10;
        }
        .sortable:hover {
            background-color: rgb(243 244 246);
            cursor: pointer;
        }
        .sort-asc::after {
            content: ' ▲';
            font-size: 0.8em;
        }
        .sort-desc::after {
            content: ' ▼';
            font-size: 0.8em;
        }
        .conflict-highlight {
            outline: 2px solid rgb(239 68 68 / 0.8);
            outline-offset: -2px;
            z-index: 5;
        }
        #main-content {
            transition: opacity 0.2s ease-in-out;
        }
        .fade-out {
            opacity: 0;
        }
        .modal { display: none; }
        .modal.is-open { display: flex; }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex font-sans">
        <!-- Sidebar Navigation -->
        <nav class="w-64 bg-white border-r border-gray-200 p-4 flex flex-col space-y-2">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 px-2">Leave Tracker</h1>
            <button data-tab="Dashboard" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                <span class="font-medium">Dashboard</span>
            </button>
            <button data-tab="Data Log" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                <span class="font-medium">Data Log</span>
            </button>
            <button data-tab="Schedule" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                <span class="font-medium">Team Schedule</span>
            </button>
            <button data-tab="Setup" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                <span class="font-medium">Setup</span>
            </button>
        </nav>
        <!-- Main Content -->
        <main class="flex-1 py-8 px-2 md:px-4 lg:px-2 bg-gray-100 overflow-y-auto">
            <div id="main-content" class="w-full">
                <!-- Content will be rendered here by JavaScript -->
            </div>

    </div>

    <!-- Edit Modal -->
    <div id="edit-daily-modal" class="modal fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full justify-center items-center">
        <div class="relative mx-auto p-8 border w-full max-w-lg shadow-lg rounded-xl bg-white">
            <div class="flex justify-between items-center pb-3">
                <h3 id="modal-title" class="text-2xl font-bold text-gray-900">Edit Entry</h3>
                <button id="modal-close-btn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600" aria-label="Close modal">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                </button>
            </div>
            <form id="modal-form" class="space-y-4">
                <!-- Form content will be injected here -->
            </form>
        </div>
    </div>

    <!-- Schedule Edit Modal -->
    <div id="edit-schedule-modal" class="modal fixed inset-0 bg-gray-900 bg-opacity-60 overflow-y-auto h-full w-full justify-center items-center z-50">
        <div class="relative mx-auto p-6 border w-full max-w-md shadow-2xl rounded-2xl bg-white border-gray-100">
            <div class="flex justify-between items-center pb-4 border-b border-gray-100">
                <div class="flex flex-col">
                    <h3 id="sched-modal-title" class="text-xl font-extrabold text-gray-900">Edit Shift Detail</h3>
                    <p id="sched-modal-subtitle" class="text-xs text-gray-500 font-bold uppercase tracking-wider mt-0.5"></p>
                </div>
                <button id="sched-modal-close-btn" class="text-gray-400 hover:text-gray-600 font-bold" aria-label="Close modal">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>

            <form id="sched-modal-form" class="space-y-4 pt-4">
                <input type="hidden" id="sched-emp-id">
                <input type="hidden" id="sched-day-code">
                
                <!-- Category Choice (Regular vs Absence vs Off) -->
                <div>
                    <label for="sched-type" class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-1.5">Shift Status / Type</label>
                    <select id="sched-type" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-yellow-500 outline-none">

                        <option value="OFF">OFF (Not Scheduled)</option>
                        <option value="HOLIDAY">HOLIDAY (Paid Off)</option>
                        <option value="VACATION">VACATION (Paid Off)</option>
                        <option value="SICK TIME">SICK TIME (Paid Off)</option>
                        <option value="PERSONAL DAY">PERSONAL DAY (Paid Off)</option>
                    </select>
                </div>
                
                <!-- Regular Shift Fields Container -->
                <div id="sched-regular-fields" class="space-y-4">
                    <!-- Preset Location Dropdown / Title -->
                    <div>
                        <label for="sched-location" class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-1.5">Location / Shift Title</label>
                        <div class="flex gap-2">

                                <option value="Call Night">Call Night</option>
                                <option value="Special Assignment">Special Assignment</option>
                                <option value="Charleston Square">Charleston Square</option>
                                <option value="Wellington">Wellington</option>
                                <option value="Custom">-- Custom Title --</option>
                            </select>
                            <input type="text" id="sched-location-custom" placeholder="Custom Title" class="w-1/2 p-2.5 border border-gray-300 rounded-lg text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-yellow-500 outline-none">
                        </div>
                    </div>
                    
                    <!-- Times Row -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="sched-in" class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-1.5">Shift In</label>
                            <input type="time" id="sched-in" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-yellow-500 outline-none">
                        </div>
                        <div>
                            <label for="sched-out" class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-1.5">Shift Out</label>
                            <input type="time" id="sched-out" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-yellow-500 outline-none">
                        </div>
                    </div>
                    
                    <!-- Break Selection -->
                    <div>
                        <label for="sched-break" class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-1.5">Meal / Break Duration</label>
                        <select id="sched-break" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-yellow-500 outline-none">
                            <option value="0">No break (00:00)</option>
                            <option value="15">15 mins (00:15)</option>
                            <option value="30">30 mins (00:30)</option>
                            <option value="45">45 mins (00:45)</option>
                            <option value="60">60 mins (01:00)</option>
                            <option value="90">90 mins (01:30)</option>
                            <option value="120">2 hours (02:00)</option>
                        </select>
                    </div>
                </div>
                
                <!-- Role / Tag Override -->
                <div>
                    <label for="sched-role" class="block text-xs font-black text-gray-500 uppercase tracking-wider mb-1.5">Role / Department Tag (Optional)</label>
                    <input type="text" id="sched-role" placeholder="e.g. Teller, Platform, BM (Leave blank for default)" class="w-full p-2.5 border border-gray-300 rounded-lg text-sm font-semibold text-gray-800 focus:ring-2 focus:ring-yellow-500 outline-none">
                </div>
                
                <!-- Save Buttons -->
                <div class="flex justify-end gap-2.5 pt-4 border-t border-gray-100">
                    <button type="button" id="sched-modal-cancel-btn" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-bold transition">Cancel</button>
                    <button type="submit" class="px-5 py-2 bg-yellow-500 hover:bg-yellow-600 text-black rounded-lg text-sm font-black transition shadow-md">Apply Shift</button>

    <script>
    // --- APP STATE ---
    let app = {
        activeTab: 'Dashboard',
        currentYear: new Date().getFullYear(),
        dailyCalendarDate: new Date(),
        monthlyCalendarDate: new Date(),
        highlightConflicts: false,
        dashboardSort: { key: 'name', order: 'asc' },
        logSort: { key: 'date', order: 'desc' },
        filters: { employeeId: 'all', leaveTypeId: 'all' },
        leaveTypes: [
            { id: 'vacation', name: 'Vacation', durationHHMM: '08:00', color: '#3b82f6' },
            { id: 'sick', name: 'Sick Day', durationHHMM: '08:00', color: '#ef4444' },
            { id: 'personal', name: 'Personal Day', durationHHMM: '08:00', color: '#f59e0b' },
            { id: 'jury', name: 'Jury Duty', durationHHMM: '08:00', color: '#8b5cf6' },
            { id: 'bereavement', name: 'Bereavement', durationHHMM: '08:00', color: '#6b7280' },
            { id: 'other', name: 'Other', durationHHMM: '08:00', color: '#10b981' },
        ],
        employees: [
            { id: 'emp1', name: 'Alice Smith', role: 'BM', cardColor: 'gray', vacationAllotment: 15 },
            { id: 'emp2', name: 'Bob Johnson', role: 'ABM', cardColor: 'white', vacationAllotment: 20 },
            { id: 'emp3', name: 'Charlie Brown', role: 'BOC', cardColor: 'blue', vacationAllotment: 15 },
        ],
        logEntries: [
            { id: 'log1', date: '2024-01-15', employeeId: 'emp1', leaveTypeId: 'vacation', duration: 1, notes: 'Pre-approved' },
            { id: 'log2', date: '2024-02-05', employeeId: 'emp2', leaveTypeId: 'sick', duration: 1, notes: 'Called out, flu' },
            { id: 'log3', date: '2024-02-20', employeeId: 'emp3', leaveTypeId: 'vacation', duration: 0.5, notes: 'AM half-day' },
            { id: 'log4', date: '2024-03-01', employeeId: 'emp1', leaveTypeId: 'sick', duration: 1, notes: 'Called out, migraine' },
            { id: 'log5', date: '2024-04-10', employeeId: 'emp2', leaveTypeId: 'personal', duration: 1, notes: 'Appointment' },
            { id: 'log6', date: '2024-04-10', employeeId: 'emp1', leaveTypeId: 'vacation', duration: 1, notes: '' },
        ],
        schedules: {},
        scheduleWeekDate: '',
        scheduleViewMode: 'editor'
    };

    // --- DOM ELEMENTS ---
    const mainContent = document.getElementById('main-content');
    const navItems = document.querySelectorAll('.nav-item');
    const modal = document.getElementById('edit-daily-modal');

    // --- ICONS ---
    const trashIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>`;
    const downloadIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>`;
    const saveIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>`;
    const loadIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1-4l-3 3m0 0l-3-3m3 3V3" /></svg>`;
    const pencilIcon = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.5L15.232 5.232z" /></svg>`;

    // --- DATA PERSISTENCE ---
    function saveState() {
        try {
            localStorage.setItem('leaveTrackerData_v4', JSON.stringify(app));
        } catch (e) {
            console.error("Could not save data to local storage.", e);
        }
    }
    
    function loadState() {
        const savedData = localStorage.getItem('leaveTrackerData_v4');
        if (savedData) {
            try {
                const parsedData = JSON.parse(savedData);
                const defaultState = {
                    activeTab: 'Dashboard',
                    currentYear: new Date().getFullYear(),
                    dailyCalendarDate: new Date(),
                    monthlyCalendarDate: new Date(),
                    highlightConflicts: false,
                    dashboardSort: { key: 'name', order: 'asc' },
                    logSort: { key: 'date', order: 'desc' },
                    filters: { employeeId: 'all', leaveTypeId: 'all' },
                    leaveTypes: [],
                    employees: [],
                    logEntries: [],
                    schedules: {},
                    scheduleWeekDate: '',
                    scheduleViewMode: 'editor',
                    ...parsedData
                };
                
                app = defaultState;
                
                app.leaveTypes = app.leaveTypes.map((lt, index) => ({
                    color: app.leaveTypes[index]?.color || '#6b7280',
                    ...lt
                }));

                app.employees = app.employees.map(emp => ({
                    role: emp.role || 'FSA',
                    cardColor: emp.cardColor || 'white',
                    vacationAllotment: emp.vacationAllotment || 15,
                    ...emp
                }));

                app.dailyCalendarDate = new Date(app.dailyCalendarDate);
                app.monthlyCalendarDate = new Date(app.monthlyCalendarDate);
                if (isNaN(app.dailyCalendarDate.getTime())) app.dailyCalendarDate = new Date();
                if (isNaN(app.monthlyCalendarDate.getTime())) app.monthlyCalendarDate = new Date();

            } catch (e) {
                console.error("Failed to load saved data. Using default data.", e);
                localStorage.removeItem('leaveTrackerData_v4');
            }
        }
    }

    // --- HELPER FUNCTIONS ---
    function hhmmToHours(hhmm) {
        if (!hhmm || typeof hhmm !== 'string' || !hhmm.includes(':')) return 0;
        const [hours, minutes] = hhmm.split(':').map(Number);
        return hours + (minutes / 60);
    }
    
    function getContrastYIQ(hexcolor){
        if (!hexcolor || typeof hexcolor !== 'string') return 'black';
        if (hexcolor.startsWith('#')) {
            hexcolor = hexcolor.substring(1);
        }
        if (hexcolor.length < 6) return 'black';
        const r = parseInt(hexcolor.substr(0,2),16);
        const g = parseInt(hexcolor.substr(2,2),16);
        const b = parseInt(hexcolor.substr(4,2),16);
        const yiq = ((r*299)+(g*587)+(b*114))/1000;
        return (yiq >= 128) ? 'black' : 'white';
    }

    function formatHoursToHHMMString(hours) {
        if (isNaN(hours) || hours <= 0) return '00 hrs : 00 min';
        const hrs = Math.floor(hours);
        const mins = Math.round((hours - hrs) * 60);
        const hrsStr = String(hrs).padStart(2, '0');
        const minsStr = String(mins).padStart(2, '0');
        return `${hrsStr} hrs : ${minsStr} min`;
    }

    function format12HourTime(timeStr) {
        if (!timeStr) return '';
        const [hourStr, minStr] = timeStr.split(':');
        let hour = parseInt(hourStr, 10);
        const ampm = hour >= 12 ? 'PM' : 'AM';
        hour = hour % 12;
        hour = hour ? hour : 12; // 0 should be 12
        return `${hour}:${minStr} ${ampm}`;
    }

    function formatBreakTime(breakMins) {
        const mins = parseInt(breakMins, 10) || 0;
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function getDatesOfWeek(mondayStr) {
        const dates = [];
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const monday = new Date(mondayStr + 'T12:00:00');
        for (let i = 0; i < 7; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            dates.push({
                dayCode: days[i],
                dateDisplay: `${d.getMonth() + 1}/${d.getDate()}`,
                dayDisplay: d.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase()
            });
        }
        return dates;
    }

    function formatDateToMMDDYYYY(dateStr) {
        if (!dateStr) return '';
        const [year, month, day] = dateStr.split('-');
        return `${parseInt(month, 10)}/${parseInt(day, 10)}/${year}`;
    }

    function getSortableValue(item, key) {
        if (!item) return null;
        let value;
        if (key === 'employeeId') {
            value = app.employees.find(e => e.id === item[key])?.name;
        } else if (key === 'leaveTypeId') {
            value = app.leaveTypes.find(lt => lt.id === item[key])?.name;
        } else {
            value = key.split('.').reduce((o, i) => o ? o[i] : undefined, item);
        }

        if (key.includes('date')) return new Date(value);
        return value;
    }
    
    function sortData(data, sortConfig) {
        const { key, order } = sortConfig;
        return [...data].sort((a, b) => {
            const valA = getSortableValue(a, key);
            const valB = getSortableValue(b, key);

            if (valA === undefined || valA === null) return 1;
            if (valB === undefined || valB === null) return -1;
            
            let comparison = 0;
            if (valA > valB) {
                comparison = 1;
            } else if (valA < valB) {
                comparison = -1;
            }
            return order === 'asc' ? comparison : -comparison;
        });
    }

    // --- RENDER FUNCTIONS ---
    function render() {
        mainContent.classList.add('fade-out');
        setTimeout(() => {
            switch (app.activeTab) {
                case 'Dashboard': renderDashboard(); break;
                case 'Data Log': renderDataLog(); break;
                case 'Schedule': renderSchedule(); break;
                case 'Setup': renderSetup(); break;
                default: renderDashboard();
            }
            updateNav();
            mainContent.classList.remove('fade-out');
        }, 200);
    }
    
    function updateNav() {
        navItems.forEach(item => {
            item.classList.toggle('active', item.dataset.tab === app.activeTab);
        });
    }
    
    function renderEmptyState(title, message, buttonText, buttonAction) {
        mainContent.innerHTML = `
            <div class="text-center py-20">

    // --- DASHBOARD VIEW ---
    function renderDashboard() {
        if (app.employees.length === 0) {
            renderEmptyState('Welcome to your Leave Tracker!', 'Add your first employee in the Setup tab to get started.', 'Go to Setup', () => { app.activeTab = 'Setup'; render(); });
            return;
        }
        
        const calculateLeaveData = (employeeId, year) => {
            const data = { vacationTaken: 0, sickTaken: 0, personalTaken: 0, totalDays: 0, totalHours: 0 };
            const leaveTypesMap = new Map(app.leaveTypes.map(lt => [lt.id, lt]));
            const logs = app.logEntries.filter(log => log.employeeId === employeeId && new Date(log.date).getFullYear() === year);
            
            logs.forEach(log => {
                data.totalDays += log.duration;
                const leaveTypeName = leaveTypesMap.get(log.leaveTypeId)?.name.toLowerCase();
                if (leaveTypeName?.includes('vacation')) data.vacationTaken += log.duration;
                if (leaveTypeName?.includes('sick')) data.sickTaken += log.duration;
                if (leaveTypeName?.includes('personal')) data.personalTaken += log.duration;

                const leaveType = leaveTypesMap.get(log.leaveTypeId);
                if (leaveType?.durationHHMM) {
                    data.totalHours += log.duration * hhmmToHours(leaveType.durationHHMM);
                }
            });
            return data;
        };
        
        const sortedEmployees = sortData(app.employees, app.dashboardSort);

        const summaryTableRows = sortedEmployees.map(employee => {
            const leaveData = calculateLeaveData(employee.id, app.currentYear);
            const vacationRemaining = employee.vacationAllotment - leaveData.vacationTaken;
            const remainingClass = vacationRemaining < 0 ? 'text-red-500' : 'text-green-600';
            
            return `
                <tr class="bg-white border-b hover:bg-gray-50">
                    <th scope="row" class="px-6 py-3 font-medium text-gray-900 whitespace-nowrap">${employee.name}</th>
                    <td class="px-6 py-3 text-center">${employee.vacationAllotment}</td>
                    <td class="px-6 py-3 text-center">${leaveData.vacationTaken}</td>
                    <td class="px-6 py-3 text-center font-semibold ${remainingClass}">${vacationRemaining}</td>
                    <td class="px-6 py-3 text-center">${leaveData.sickTaken}</td>
                    <td class="px-6 py-3 text-center">${leaveData.personalTaken}</td>
                    <td class="px-6 py-3 text-center font-semibold">${leaveData.totalDays}</td>
                    <td class="px-6 py-3 text-center font-bold text-blue-600">${parseFloat(leaveData.totalHours.toFixed(2))}</td>
                </tr>`;
        }).join('');
        
        const getSortClass = (key) => app.dashboardSort.key === key ? `sort-${app.dashboardSort.order}` : '';

        const summaryHtml = `
            <div>
              <div class="flex justify-between items-center mb-4">
                <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
                <div class="flex items-center space-x-4">
                  <div class="flex items-center space-x-2">
                    <label for="year-select" class="font-medium text-gray-700">Year:</label>
                    <input id="year-select" type="number" value="${app.currentYear}" class="w-24 p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" />
                  </div>
                  <div class="flex items-center space-x-2">
                    <button id="save-btn" class="flex items-center bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 font-semibold shadow-md transition-colors">
                      ${saveIcon}<span class="ml-2">Save Data</span>
                    </button>
                    <input type="file" id="load-data-input" class="hidden" accept=".json">
                    <label for="load-data-input" class="cursor-pointer flex items-center bg-gray-600 text-white py-2 px-4 rounded-md hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 font-semibold shadow-md transition-colors">
                      ${loadIcon}<span class="ml-2">Load Data</span>
                    </label>
                    <button id="download-btn" class="flex items-center bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 font-semibold shadow-md transition-colors">
                      ${downloadIcon}<span class="ml-2">Download (.xlsx)</span>
                    </button>
                  </div>
                </div>
              </div>
              <div class="bg-white shadow-lg rounded-xl overflow-hidden mt-8">
                <h2 class="text-2xl font-semibold text-gray-700 p-6">Team Leave Summary</h2>
                <div class="overflow-x-auto">
                  <table class="w-full text-sm text-left text-gray-600">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                      <tr>
                        <th scope="col" class="px-6 py-3 sortable ${getSortClass('name')}" data-sort-key="name">Employee Name</th>
                        <th scope="col" class="px-6 py-3 text-center sortable ${getSortClass('vacationAllotment')}" data-sort-key="vacationAllotment">Vacation Allotment</th>
                        <th scope="col" class="px-6 py-3 text-center">Vacation Taken</th>
                        <th scope="col" class="px-6 py-3 text-center">Vacation Remaining</th>
                        <th scope="col" class="px-6 py-3 text-center">Sick Days Taken</th>
                        <th scope="col" class="px-6 py-3 text-center">Personal Days Taken</th>
                        <th scope="col" class="px-6 py-3 text-center font-semibold">Total Days Taken</th>
                        <th scope="col" class="px-6 py-3 text-center font-bold">Total Hours Taken</th>
                      </tr>
                    </thead>
                    <tbody>${summaryTableRows}</tbody>
                  </table>
                </div>
              </div>
            </div>`;

        mainContent.innerHTML = summaryHtml + generateDailyCalendarHTML() + generateMonthlyCalendarHTML() + generateYearlyGridViewHTML(app.currentYear, true);

        // --- Event Listeners for Dashboard ---
        mainContent.querySelector('#year-select').addEventListener('change', (e) => { app.currentYear = parseInt(e.target.value, 10); saveState(); renderDashboard(); });
        mainContent.querySelector('#save-btn').addEventListener('click', () => {
            const dataStr = JSON.stringify(app, null, 2); const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = 'leave-tracker-data.json'; a.click(); URL.revokeObjectURL(url);
        });
        mainContent.querySelector('#load-data-input').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const loadedData = JSON.parse(event.target.result);
                    if (loadedData.employees && loadedData.logEntries && loadedData.leaveTypes) {
                        app = loadedData; loadState(); saveState(); render(); alert('Data loaded successfully!');
                    } else { alert('Invalid data file format.'); }
                } catch (err) { alert('Error reading or parsing data file.'); console.error(err); } 
                finally { e.target.value = ''; }
            };
            reader.readAsText(file);
        });
        mainContent.querySelector('#download-btn').addEventListener('click', () => { exportToSpreadsheet(app.employees, app.logEntries, app.leaveTypes, app.currentYear); });
        mainContent.querySelectorAll('.sortable').forEach(header => {
            header.addEventListener('click', () => {
                const key = header.dataset.sortKey;
                if (app.dashboardSort.key === key) { app.dashboardSort.order = app.dashboardSort.order === 'asc' ? 'desc' : 'asc'; } 
                else { app.dashboardSort.key = key; app.dashboardSort.order = 'asc'; }
                saveState(); renderDashboard();
            });
        });
        mainContent.querySelector('#prev-day').addEventListener('click', () => { app.dailyCalendarDate.setDate(app.dailyCalendarDate.getDate() - 1); saveState(); renderDashboard(); });
        mainContent.querySelector('#next-day').addEventListener('click', () => { app.dailyCalendarDate.setDate(app.dailyCalendarDate.getDate() + 1); saveState(); renderDashboard(); });
        mainContent.querySelector('#prev-month').addEventListener('click', () => { app.monthlyCalendarDate.setMonth(app.monthlyCalendarDate.getMonth() - 1); saveState(); renderDashboard(); });
        mainContent.querySelector('#next-month').addEventListener('click', () => { app.monthlyCalendarDate.setMonth(app.monthlyCalendarDate.getMonth() + 1); saveState(); renderDashboard(); });
        mainContent.querySelector('#conflict-toggle').addEventListener('change', (e) => { app.highlightConflicts = e.target.checked; saveState(); renderDashboard(); });
        mainContent.querySelectorAll('.edit-daily-btn').forEach(btn => btn.addEventListener('click', (e) => {
            const { employeeId, dateStr } = e.currentTarget.dataset;
            openEditModal(employeeId, dateStr);
        }));
    }

    // --- CALENDAR VIEW GENERATORS ---
    function generateDailyCalendarHTML() {
        const date = app.dailyCalendarDate;
        const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        const leavesToday = app.logEntries.filter(log => log.date === dateStr);
        const employeeRows = app.employees.map(emp => {
            const leave = leavesToday.find(l => l.employeeId === emp.id);
            let statusHtml, detailsHtml, notesHtml, rowClass;
            if (leave) {
                const leaveType = app.leaveTypes.find(lt => lt.id === leave.leaveTypeId);
                statusHtml = `<span class="font-semibold text-red-600">On Leave</span>`;
                detailsHtml = `${leaveType?.name || 'Unknown'} (${leave.duration === 0.5 ? 'Half Day' : 'Full Day'})`;
                notesHtml = leave.notes || '-';
                rowClass = 'bg-red-50 hover:bg-red-100';
            } else {
                statusHtml = `<span class="font-semibold text-green-600">Available</span>`;
                detailsHtml = '-';
                notesHtml = '-';
                rowClass = 'bg-white hover:bg-gray-50';
            }
            return `<tr class="${rowClass} border-b"><th scope="row" class="px-6 py-4 font-medium text-gray-900">${emp.name}</th><td class="px-6 py-4">${statusHtml}</td><td class="px-6 py-4">${detailsHtml}</td><td class="px-6 py-4">${notesHtml}</td><td class="px-6 py-4 text-center"><button class="edit-daily-btn text-gray-500 hover:text-blue-600 p-2 rounded-full hover:bg-gray-200" data-employee-id="${emp.id}" data-date-str="${dateStr}" aria-label="Edit entry for ${emp.name}">${pencilIcon}</button></td></tr>`;
        }).join('');
        return `<div class="bg-white shadow-lg rounded-xl overflow-hidden mt-12"><div class="p-6"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-gray-800">Daily View</h2><div class="flex items-center space-x-2"><button id="prev-day" class="p-2 bg-white border rounded-md shadow-sm hover:bg-gray-50" aria-label="Previous day"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button><h3 class="text-xl font-bold text-gray-800 text-center w-64">${date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</h3><button id="next-day" class="p-2 bg-white border rounded-md shadow-sm hover:bg-gray-50" aria-label="Next day"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button></div></div></div><div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-600"><thead class="text-xs text-gray-700 uppercase bg-gray-50"><tr><th scope="col" class="px-6 py-3">Employee</th><th scope="col" class="px-6 py-3">Status</th><th scope="col" class="px-6 py-3">Details</th><th scope="col" class="px-6 py-3">Notes</th><th scope="col" class="px-6 py-3 text-center">Edit</th></tr></thead><tbody>${employeeRows}</tbody></table></div></div>`;
    }

    function generateMonthlyCalendarHTML() {
        const date = app.monthlyCalendarDate; const year = date.getFullYear(); const month = date.getMonth();
        const monthName = date.toLocaleString('default', { month: 'long' });
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const dayHeaders = Array.from({ length: daysInMonth }, (_, i) => `<th class="p-1 font-semibold text-gray-600 border-l border-gray-200 text-center text-xs" style="min-width: 30px;">${i + 1}</th>`).join('');
        const leavesByDay = {};
        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            leavesByDay[i] = app.logEntries.filter(log => log.date === dateStr).length;
        }
        const employeeRows = app.employees.map(employee => {
            const dayCells = Array.from({ length: daysInMonth }, (_, i) => {
                const day = i + 1;
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const leave = app.logEntries.find(log => log.employeeId === employee.id && log.date === dateStr);
                const conflictClass = app.highlightConflicts && leavesByDay[day] > 1 ? 'conflict-highlight' : '';
                if (leave) {
                    const leaveType = app.leaveTypes.find(lt => lt.id === leave.leaveTypeId);
                    const abbreviation = leaveType ? leaveType.name.charAt(0) : 'L';
                    const bgColor = leaveType?.color || '#a1a1aa';
                    const textColor = getContrastYIQ(bgColor);
                    const content = leave.duration < 1 ? `½` : abbreviation;
                    return `<td class="relative border-l border-gray-200 text-center p-0"><div style="background-color: ${bgColor}; color: ${textColor};" class="w-full h-full flex items-center justify-center font-bold text-xs p-1 ${conflictClass}" title="${leaveType?.name || ''}">${content}</div></td>`;
                }
                return `<td class="relative border-l border-gray-200 h-10 p-0"><div class="w-full h-full ${conflictClass}"></div></td>`;
            }).join('');
            return `<tr class="border-t border-gray-200"><td class="sticky-col bg-white hover:bg-gray-50 p-2 text-sm text-left font-medium text-gray-800 border-r w-36 truncate">${employee.name}</td>${dayCells}</tr>`;
        }).join('');
        return `<div class="bg-white shadow-lg rounded-xl mt-12"><div class="p-6"><div class="flex justify-between items-center mb-6"><div class="flex items-center space-x-4"><h2 class="text-2xl font-semibold text-gray-700">Monthly Calendar</h2><div class="flex items-center"><input id="conflict-toggle" type="checkbox" ${app.highlightConflicts ? 'checked' : ''} class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"><label for="conflict-toggle" class="ml-2 block text-sm text-gray-700">Highlight Conflicts</label></div></div><div class="flex items-center space-x-2"><button id="prev-month" class="p-2 bg-white border rounded-md shadow-sm hover:bg-gray-50" aria-label="Previous month"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button><h3 class="text-xl font-bold text-gray-800 w-32 text-center">${monthName} ${year}</h3><button id="next-month" class="p-2 bg-white border rounded-md shadow-sm hover:bg-gray-50" aria-label="Next month"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button></div></div></div><div class="overflow-x-auto"><table class="w-full border-collapse" style="min-width: 800px;"><thead><tr class="bg-gray-50"><th class="sticky-col bg-gray-50 p-2 text-sm text-left font-semibold text-gray-700 border-r w-36">Employee</th>${dayHeaders}</tr></thead><tbody>${employeeRows}</tbody></table></div></div>`;
    }
    
    function generateYearlyGridViewHTML(year) {
        const months = Array.from({length: 12}, (_, i) => i);
        const monthNames = months.map(m => new Date(year, m).toLocaleString('default', { month: 'short' }));
        const monthHeaders = monthNames.map(name => `<th class="px-4 py-3 text-center">${name.toUpperCase()}</th>`).join('');
        
        const employeeRows = app.employees.map(emp => {
            const monthlyTotals = months.map(month => {
                return app.logEntries.filter(log => log.employeeId === emp.id && new Date(log.date).getFullYear() === year && new Date(log.date).getMonth() === month).reduce((sum, log) => sum + log.duration, 0);
            });
            return { name: emp.name, totals: monthlyTotals };
        });

        const tableRows = employeeRows.map(empData => {
            const grandTotal = empData.totals.reduce((sum, total) => sum + total, 0);
            const monthCells = empData.totals.map(total => {
                let fontColorClass = 'text-gray-500';
                if (total > 0) {
                    if (total === 1) { fontColorClass = 'text-orange-500'; }
                    else if (total >= 2) { fontColorClass = 'text-red-600'; }
                }
                return `<td class="px-4 py-4 text-center font-bold ${fontColorClass}">${total > 0 ? total : '-'}</td>`;
            }).join('');
            return `<tr class="border-b border-gray-200 hover:bg-gray-50"><th scope="row" class="px-6 py-4 font-medium text-gray-800 whitespace-nowrap">${empData.name}</th>${monthCells}<td class="px-4 py-4 text-center font-bold text-blue-600">${grandTotal > 0 ? grandTotal : '-'}</td></tr>`;
        }).join('');

        const title = `<h2 class="text-2xl font-bold text-gray-800 p-6">Yearly Leave Summary for ${year}</h2>`;
        const header = `<thead class="text-xs text-gray-500 uppercase bg-white border-b"><tr class="font-semibold"><th scope="col" class="px-6 py-3 text-left">Employee</th>${monthHeaders}<th scope="col" class="px-4 py-3 text-center">Annual Total</th></tr></thead>`;

        return `<div class="bg-white shadow-lg rounded-xl overflow-hidden mt-12">${title}<div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-600">${header}<tbody>${tableRows}</tbody></table></div></div>`;
    }

        mainContent.innerHTML = `

    // --- TEAM SCHEDULE VIEW & HELPERS ---
    function calculateHours(shiftIn, shiftOut, breakMins) {
        if (!shiftIn || !shiftOut) return 0;
        const [inH, inM] = shiftIn.split(':').map(Number);
        const [outH, outM] = shiftOut.split(':').map(Number);
        let diffMins = (outH * 60 + outM) - (inH * 60 + inM);
        if (diffMins < 0) {
            diffMins += 24 * 60; // Overnight shift
        }
        const bMins = parseInt(breakMins, 10) || 0;
        const netMins = diffMins - bMins;
        return netMins > 0 ? parseFloat((netMins / 60).toFixed(2)) : 0;
    }

    function getShiftHours(dayData) {
        if (!dayData || !dayData.active) return 0;
        const typeUpper = (dayData.type || 'Regular').toUpperCase();
        if (typeUpper !== 'REGULAR' && typeUpper !== 'OFF') {
            return 8.0; // Paid absence defaults to 8 hours
        }
        return calculateHours(dayData.shiftIn, dayData.shiftOut, dayData.breakMins);
    }

    function getEmployeeBgColor(cardColor) {
        switch (cardColor) {
            case 'gray': return 'bg-[#f3f4f6]'; // Gray (BM / ABM)
            case 'blue': return 'bg-[#cfe2f3]'; // Light Blue (BOC)
            case 'yellow': return 'bg-[#ffd966]'; // Gold / Yellow (FSA)
            case 'green': return 'bg-[#d9ead3]'; // Mint Green (Teller)
            default: return 'bg-white'; // White (Default)
        }
    }

    function getEmployeeTextClass(cardColor) {
        switch (cardColor) {
            case 'gray': return 'text-gray-600';
            case 'blue': return 'text-[#0b5394]';
            case 'yellow': return 'text-[#b45f06]';
            case 'green': return 'text-[#274e13]';
            default: return 'text-gray-400';
        }
    }

    function getMondayDateString(d) {
        const date = new Date(d);
        const day = date.getDay();
        const diff = date.getDate() - day + (day === 0 ? -6 : 1);
        const monday = new Date(date.setDate(diff));
        return formatDateToYYYYMMDD(monday);
    }

    function formatDateToYYYYMMDD(d) {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function getWeekDisplayRange(mondayStr) {
        const monday = new Date(mondayStr + 'T12:00:00');
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        const options = { month: 'short', day: 'numeric', year: 'numeric' };
        return `${monday.toLocaleDateString('en-US', options)} – ${sunday.toLocaleDateString('en-US', options)}`;
    }

    function format12Hour(timeStr) {
        if (!timeStr) return '';
        const [hourStr, minStr] = timeStr.split(':');
        let hour = parseInt(hourStr, 10);
        const ampm = hour >= 12 ? 'PM' : 'AM';
        hour = hour % 12;
        hour = hour ? hour : 12;
        return `${hour}:${minStr} ${ampm}`;
    }

    function showToast(title, message, type = 'success') {
        let toastContainer = document.getElementById('toast-container');
        if (!toastContainer) {
            toastContainer = document.createElement('div');
            toastContainer.id = 'toast-container';
            toastContainer.className = 'fixed bottom-5 right-5 z-50 flex flex-col space-y-3';
            document.body.appendChild(toastContainer);
        }
        
        const toast = document.createElement('div');
        let typeClasses = 'bg-white border-green-500 text-green-800';
        let iconHtml = `
            <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        `;
        
        if (type === 'info') {
            typeClasses = 'bg-white border-blue-500 text-blue-800';
            iconHtml = `
                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            `;
        }
        
        toast.className = `flex items-center space-x-3 p-4 border-l-4 rounded-lg shadow-lg max-w-sm transition-all duration-300 transform translate-y-5 opacity-0 ${typeClasses}`;
        toast.innerHTML = `
            <div>${iconHtml}</div>
            <div class="flex flex-col">
                <span class="text-sm font-bold">${title}</span>
                <span class="text-xs text-gray-500 font-semibold mt-0.5">${message}</span>
            </div>
        `;
        
        toastContainer.appendChild(toast);
        setTimeout(() => {
            toast.classList.remove('translate-y-5', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
        }, 10);
        
        setTimeout(() => {
            toast.classList.remove('translate-y-0', 'opacity-100');
            toast.classList.add('translate-y-5', 'opacity-0');
            setTimeout(() => { toast.remove(); }, 300);
        }, 3000);

    function getWeeklySchedule(weekDate) {
        if (!app.schedules) {
            app.schedules = {};
        }
        if (!app.schedules[weekDate]) {
            app.schedules[weekDate] = [];
        }
        
        app.employees.forEach(emp => {
            let empSched = app.schedules[weekDate].find(s => s.employeeId === emp.id);
            if (!empSched) {
                empSched = {
                    employeeId: emp.id,
                    days: {
                        "Mon": { active: true, type: 'Regular', location: 'Boca', shiftIn: "09:00", shiftOut: "17:00", breakMins: 60, role: emp.role || 'FSA' },
                        "Tue": { active: true, type: 'Regular', location: 'Boca', shiftIn: "09:00", shiftOut: "17:00", breakMins: 60, role: emp.role || 'FSA' },
                        "Wed": { active: true, type: 'Regular', location: 'Boca', shiftIn: "09:00", shiftOut: "17:00", breakMins: 60, role: emp.role || 'FSA' },
                        "Thu": { active: true, type: 'Regular', location: 'Boca', shiftIn: "09:00", shiftOut: "17:00", breakMins: 60, role: emp.role || 'FSA' },
                        "Fri": { active: true, type: 'Regular', location: 'Boca', shiftIn: "09:00", shiftOut: "17:00", breakMins: 60, role: emp.role || 'FSA' },
                        "Sat": { active: false, type: 'OFF', role: emp.role || 'FSA' },
                        "Sun": { active: false, type: 'OFF', role: emp.role || 'FSA' }
                    }
                };
                app.schedules[weekDate].push(empSched);
            }
        });
        
        return app.schedules[weekDate];
    }

    function renderScheduleCalendar(weekSchedules, days) {
        const daysOfWeekFull = {
            'Mon': 'Monday', 'Tue': 'Tuesday', 'Wed': 'Wednesday', 'Thu': 'Thursday', 'Fri': 'Friday', 'Sat': 'Saturday', 'Sun': 'Sunday'
        };
        
        const monday = new Date(app.scheduleWeekDate + 'T12:00:00');
        const dayCards = days.map((day, index) => {
            const currentDate = new Date(monday);
            currentDate.setDate(monday.getDate() + index);
            const dateStr = currentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            const workingStaff = [];
            let totalHrs = 0;
            
            weekSchedules.forEach(sched => {
                const dayData = sched.days[day];
                if (dayData && dayData.active) {
                    const emp = app.employees.find(e => e.id === sched.employeeId);
                    if (emp) {
                        const hrs = calculateHours(dayData.shiftIn, dayData.shiftOut, dayData.breakMins);
                        workingStaff.push({
                            name: emp.name,
                            shift: `${format12Hour(dayData.shiftIn)} – ${format12Hour(dayData.shiftOut)}`,
                            break: dayData.breakMins > 0 ? `(${dayData.breakMins}m break)` : 'no break',
                            hours: hrs
                        });
                        totalHrs += hrs;
                    }
                }
            });
            
            workingStaff.sort((a, b) => a.shift.localeCompare(b.shift));
            const staffListHtml = workingStaff.length > 0
                ? workingStaff.map(s => `
                     <div class="flex items-start justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100/80 transition-colors border border-gray-100">
                         <div class="flex flex-col">
                             <span class="text-sm font-bold text-gray-800">${s.name}</span>
                             <span class="text-xs text-gray-500 font-semibold mt-0.5">${s.shift} <span class="text-gray-400 font-normal">${s.break}</span></span>
                         </div>
                         <span class="text-xs font-extrabold text-blue-600 bg-blue-50 px-2 py-1 rounded">${s.hours} hrs</span>
                     </div>
                 `).join('')
                : `
                     <div class="text-center py-8 border border-dashed border-gray-200 rounded-lg bg-gray-50/50">
                         <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">No shifts scheduled</span>
                     </div>
                 `;
                 
            return `
                 <div class="bg-white p-5 shadow-md border border-gray-200 rounded-xl flex flex-col justify-between">
                     <div>
                         <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
                             <div class="flex flex-col">
                                 <span class="text-base font-extrabold text-gray-800">${daysOfWeekFull[day]}</span>
                                 <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">${dateStr}</span>
                             </div>
                             <span class="text-xs font-black text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-full">${workingStaff.length} Scheduled</span>
                         </div>
                         <div class="space-y-2.5">
                             ${staffListHtml}
                         </div>
                     </div>
                     ${workingStaff.length > 0 ? `
                         <div class="mt-4 pt-3 border-t border-gray-100 flex justify-between items-center text-xs font-bold text-gray-500">
                             <span>Daily Total Hours:</span>
                             <span class="text-gray-800 text-sm font-black">${parseFloat(totalHrs.toFixed(2))}h</span>
                         </div>
                     ` : ''}
                 </div>
             `;
        }).join('');
        
        return `
             <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                 ${dayCards}
             </div>
        `;
    }

    function attachEditorListeners(weekSchedules, days) {
        const tableBody = mainContent.querySelector('tbody');
        if (!tableBody) return;
        
        tableBody.addEventListener('click', e => {
            const target = e.target;
            
            // Check if clicked cell is a schedule cell (or child of it)
            const cell = target.closest('.schedule-cell');
            if (cell) {
                const empId = cell.dataset.empId;
                const day = cell.dataset.day;
                openSchedModal(empId, day, app.scheduleWeekDate);
                return;
            }
            
            const rowDefaultBtn = target.closest('.row-default-btn');
            if (rowDefaultBtn) {
                const row = target.closest('tr');
                const empId = row.dataset.empId;
                const empSched = weekSchedules.find(s => s.employeeId === empId);
                if (empSched) {
                    ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'].forEach(day => {
                        empSched.days[day] = { active: true, type: 'Regular', location: 'Boca', shiftIn: '09:00', shiftOut: '17:00', breakMins: 60 };
                    });
                    ['Sat', 'Sun'].forEach(day => {
                        empSched.days[day] = { active: false, type: 'OFF', location: '', shiftIn: '', shiftOut: '', breakMins: 0 };
                    });
                    saveState();
                    renderSchedule();
                    showToast('Row Filled', 'Monday-Friday shifts filled with standard Boca 9am-5pm hours.', 'success');
                }
                return;
            }
            
            const rowClearBtn = target.closest('.row-clear-btn');
            if (rowClearBtn) {
                const row = target.closest('tr');
                const empId = row.dataset.empId;
                const empSched = weekSchedules.find(s => s.employeeId === empId);
                if (empSched) {
                    days.forEach(day => {
                        empSched.days[day] = { active: false, type: 'OFF', location: '', shiftIn: '', shiftOut: '', breakMins: 0 };
                    });
                    saveState();
                    renderSchedule();
                    showToast('Row Cleared', 'All days set to OFF.', 'info');
                }
                return;
            }
        });
    }

    function updateCellAndRowTotals(cell, empSched, day, weekSchedules, days) {
        const dayData = empSched.days[day];
        const dayHrs = dayData.active ? calculateHours(dayData.shiftIn, dayData.shiftOut, dayData.breakMins) : 0;
        
        const hrsBadge = cell.querySelector('.bg-blue-100');
        if (hrsBadge) {
            hrsBadge.textContent = `${dayHrs}h`;
        }
        
        let empTotalHrs = 0;
        days.forEach(d => {
            const dData = empSched.days[d];
            if (dData && dData.active) {
                empTotalHrs += calculateHours(dData.shiftIn, dData.shiftOut, dData.breakMins);
            }
        });
        
        const row = cell.closest('tr');
        const rowTotalTd = row.querySelector('.row-total-hrs');
        if (rowTotalTd) {
            rowTotalTd.textContent = `${parseFloat(empTotalHrs.toFixed(2))}h`;
        }
        
        const dailyTotals = days.map(d => {
            let totalHrs = 0;
            let countActive = 0;
            weekSchedules.forEach(sched => {
                const dData = sched.days[d];
                if (dData && dData.active) {
                    totalHrs += calculateHours(dData.shiftIn, dData.shiftOut, dData.breakMins);
                    countActive++;
                }
            });
            return { hours: parseFloat(totalHrs.toFixed(2)), count: countActive };
        });
        
        const colTotalTds = mainContent.querySelectorAll('.col-total-hrs');
        colTotalTds.forEach((td, i) => {
            td.textContent = `${dailyTotals[i].hours}h`;
        });
        
        const colTotalStaffTds = mainContent.querySelectorAll('.col-total-staff');
        colTotalStaffTds.forEach((td, i) => {
            td.textContent = `${dailyTotals[i].count} Active`;
        });
        
        const grandTotalSum = dailyTotals.reduce((sum, t) => sum + t.hours, 0);
        const grandTotalTd = document.getElementById('grand-total-hrs');
        if (grandTotalTd) {
            grandTotalTd.textContent = `${parseFloat(grandTotalSum.toFixed(2))}h`;
        }
        
        saveState();
    }

    function exportScheduleToSpreadsheet() {
        if (typeof XLSX === 'undefined') { alert("Could not export data. The required library is missing."); return; }
        const wb = XLSX.utils.book_new();
        
        const headerRow = ['Employee', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday', 'Total Hours'];
        const rows = [
            ['Team Schedule - Week of ' + app.scheduleWeekDate],
            [],
            headerRow
        ];
        
        const currentWeekSchedules = getWeeklySchedule(app.scheduleWeekDate);
        app.employees.forEach(emp => {
            const empSched = currentWeekSchedules.find(s => s.employeeId === emp.id);
            const rowData = [emp.name];
            let rowTotal = 0;
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            days.forEach(day => {
                if (empSched && empSched.days[day] && empSched.days[day].active) {
                    const dayData = empSched.days[day];
                    const hours = calculateHours(dayData.shiftIn, dayData.shiftOut, dayData.breakMins);
                    rowData.push(`${dayData.shiftIn} - ${dayData.shiftOut} (Meal: ${dayData.breakMins}m) [${hours} hrs]`);
                    rowTotal += hours;
                } else {
                    rowData.push('OFF');
                }
            });
            rowData.push(rowTotal);
            rows.push(rowData);
        });
        
        const ws = XLSX.utils.aoa_to_sheet(rows);
        ws['!cols'] = [{wch:20}, {wch:28}, {wch:28}, {wch:28}, {wch:28}, {wch:28}, {wch:28}, {wch:28}, {wch:15}];
        XLSX.utils.book_append_sheet(wb, ws, 'Weekly Schedule');
        XLSX.writeFile(wb, `Team_Schedule_Week_${app.scheduleWeekDate}.xlsx`);
    }

    function openSchedModal(employeeId, day, weekDate) {
        const modalEl = document.getElementById('edit-schedule-modal');
        const emp = app.employees.find(e => e.id === employeeId);
        const weekSchedules = getWeeklySchedule(weekDate);
        const empSched = weekSchedules.find(s => s.employeeId === employeeId);
        if (!empSched) return;
        
        const dayData = empSched.days[day] || { active: false, type: 'OFF', location: 'Boca', shiftIn: '09:00', shiftOut: '17:00', breakMins: 60 };
        
        document.getElementById('sched-emp-id').value = employeeId;
        document.getElementById('sched-day-code').value = day;
        
        document.getElementById('sched-modal-title').textContent = `Shift Detail: ${emp.name}`;
        document.getElementById('sched-modal-subtitle').textContent = `${day}day (${dayData.type || 'Regular'})`;
        
        const schedTypeSelect = document.getElementById('sched-type');
        schedTypeSelect.value = dayData.active ? (dayData.type || 'Regular') : 'OFF';
        
        const schedLocationPresets = document.getElementById('sched-location-presets');
        const schedLocationCustom = document.getElementById('sched-location-custom');
        const locationVal = dayData.location || 'Boca';
        const isPreset = ['Boca', 'Call Night', 'Special Assignment', 'Charleston Square', 'Wellington'].includes(locationVal);
        
        if (isPreset) {
            schedLocationPresets.value = locationVal;
            schedLocationCustom.value = '';
            schedLocationCustom.style.display = 'none';
        } else {
            schedLocationPresets.value = 'Custom';
            schedLocationCustom.value = locationVal;
            schedLocationCustom.style.display = 'block';
        }
        
        document.getElementById('sched-in').value = dayData.shiftIn || '09:00';
        document.getElementById('sched-out').value = dayData.shiftOut || '17:00';
        document.getElementById('sched-break').value = String(dayData.breakMins !== undefined ? dayData.breakMins : 60);
        document.getElementById('sched-role').value = dayData.role || emp.role || '';
        
        // Handle field visibility
        const regularFields = document.getElementById('sched-regular-fields');
        if (schedTypeSelect.value === 'OFF') {
            regularFields.style.display = 'none';
        } else {
            regularFields.style.display = 'block';
        }
        
        schedTypeSelect.onchange = () => {
            if (schedTypeSelect.value === 'OFF') {
                regularFields.style.display = 'none';
            } else {
                regularFields.style.display = 'block';
            }
        };
        
        schedLocationPresets.onchange = () => {
            if (schedLocationPresets.value === 'Custom') {
                schedLocationCustom.style.display = 'block';
            } else {
                schedLocationCustom.style.display = 'none';
            }
        };
        
        // Setup Close Event Handlers
        const closeBtn = document.getElementById('sched-modal-close-btn');
        const cancelBtn = document.getElementById('sched-modal-cancel-btn');
        const form = document.getElementById('sched-modal-form');
        
        const closeModal = () => {
            modalEl.classList.remove('is-open');
        };
        
        closeBtn.onclick = closeModal;
        cancelBtn.onclick = closeModal;
        
        form.onsubmit = (e) => {
            e.preventDefault();
            const activeType = schedTypeSelect.value;
            const activeWorking = activeType !== 'OFF';
            
            dayData.active = activeWorking;
            dayData.type = activeType;
            
            if (activeWorking) {
                const finalLocation = schedLocationPresets.value === 'Custom' ? schedLocationCustom.value : schedLocationPresets.value;
                dayData.location = finalLocation || 'Boca';
                dayData.shiftIn = document.getElementById('sched-in').value;
                dayData.shiftOut = document.getElementById('sched-out').value;
                dayData.breakMins = parseInt(document.getElementById('sched-break').value, 10) || 0;
                dayData.role = document.getElementById('sched-role').value || emp.role || '';
            } else {
                dayData.location = '';
                dayData.shiftIn = '';
                dayData.shiftOut = '';
                dayData.breakMins = 0;
                dayData.role = '';
            }
            
            saveState();
            closeModal();
            renderSchedule();
            showToast('Shift Updated', `Updated shift for ${emp.name} on ${day}.`, 'success');
        };
        
        modalEl.classList.add('is-open');
    }

    // --- MODAL LOGIC ---
    function openEditModal(employeeId, dateStr) {
        const modalTitle = modal.querySelector('#modal-title');
        const modalForm = modal.querySelector('#modal-form');
        const employee = app.employees.find(e => e.id === employeeId);
        const logEntry = app.logEntries.find(log => log.employeeId === employeeId && log.date === dateStr);
        
        const leaveTypeOptions = app.leaveTypes.map(lt => `<option value="${lt.id}" ${logEntry?.leaveTypeId === lt.id ? 'selected' : ''}>${lt.name}</option>`).join('');
        
        modalTitle.textContent = `${logEntry ? 'Edit' : 'Add'} Leave for ${employee.name}`;
        
        modalForm.innerHTML = `
            <input type="hidden" name="employeeId" value="${employeeId}">
            <input type="hidden" name="date" value="${dateStr}">
            ${logEntry ? `<input type="hidden" name="logId" value="${logEntry.id}">` : ''}
            <div>
                <label for="modal-leaveTypeId" class="block text-sm font-medium text-gray-700">Absence Type</label>
                <select id="modal-leaveTypeId" name="leaveTypeId" class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500" required>${leaveTypeOptions}</select>
            </div>
            <div>
                <label for="modal-duration" class="block text-sm font-medium text-gray-700">Duration (Days)</label>
                <select id="modal-duration" name="duration" class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="1" ${logEntry?.duration === 1 ? 'selected' : ''}>Full Day</option>
                    <option value="0.5" ${logEntry?.duration === 0.5 ? 'selected' : ''}>Half Day</option>
                </select>
            </div>
            <div>
                <label for="modal-notes" class="block text-sm font-medium text-gray-700">Notes</label>
                <textarea id="modal-notes" name="notes" rows="3" class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">${logEntry?.notes || ''}</textarea>
            </div>
            <div class="flex justify-between items-center pt-4">
                <div>${logEntry ? `<button type="button" id="modal-delete-btn" class="text-red-600 hover:text-red-800 font-semibold">Delete Entry</button>` : ''}</div>
                <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 font-semibold shadow-md">Save Changes</button>
            </div>
        `;

        modalForm.onsubmit = (e) => {
            e.preventDefault();
            const formData = new FormData(modalForm);
            const data = Object.fromEntries(formData.entries());
            data.duration = parseFloat(data.duration);

            if (data.logId) { // Editing existing log
                const index = app.logEntries.findIndex(l => l.id === data.logId);
                app.logEntries[index] = { ...app.logEntries[index], ...data };
            } else { // Adding new log
                app.logEntries.push({ ...data, id: `log${Date.now()}` });
            }
            saveState();
            renderDashboard();
            closeEditModal();
        };

        if (logEntry) {
            document.getElementById('modal-delete-btn').onclick = () => {
                if(confirm('Are you sure you want to delete this leave entry?')) {
                    app.logEntries = app.logEntries.filter(l => l.id !== logEntry.id);
                    saveState();
                    renderDashboard();
                    closeEditModal();
                }
            };
        }

        modal.classList.add('is-open');
    }

    function closeEditModal() {
        modal.classList.remove('is-open');
    }


    // --- EXPORT LOGIC ---
    function exportToSpreadsheet(employees, logEntries, leaveTypes, year) {
        if (typeof XLSX === 'undefined') { alert("Could not export data. The required library is missing."); return; }
        const wb = XLSX.utils.book_new();
        const dashboardData = [['Team Leave Summary', '', 'Year:', year], [], ['Employee Name', 'Vacation Allotment', 'Vacation Taken', 'Vacation Remaining', 'Sick Days Taken', 'Personal Days Taken', 'Total Days Taken']];
        employees.forEach(emp => { dashboardData.push([emp.name, emp.vacationAllotment]); });
        const dashboardSheet = XLSX.utils.aoa_to_sheet(dashboardData);
        employees.forEach((_, index) => {
            const r = index + 4;
            const formula = (type) => `SUMIFS('Data Log'!D:D,'Data Log'!B:B,A${r},'Data Log'!C:C,"${type}",'Data Log'!A:A,">="&DATE($D$1,1,1),'Data Log'!A:A,"<="&DATE($D$1,12,31))`;
            dashboardSheet[`C${r}`] = {t:'n', f: formula('Vacation')};
            dashboardSheet[`D${r}`] = {t:'n', f: `B${r}-C${r}`};
            dashboardSheet[`E${r}`] = {t:'n', f: formula('Sick Day')};
            dashboardSheet[`F${r}`] = {t:'n', f: formula('Personal Day')};
            dashboardSheet[`G${r}`] = {t:'n', f: `SUM(C${r},E${r},F${r})`};
        });
        dashboardSheet['!cols'] = [{wch:25},{wch:18},{wch:15},{wch:20},{wch:18},{wch:20},{wch:18}];
        XLSX.utils.book_append_sheet(wb, dashboardSheet, 'Dashboard');
        const employeeMap = new Map(employees.map(e => [e.id, e.name]));
        const leaveTypeMap = new Map(leaveTypes.map(lt => [lt.id, lt.name]));
        const logData = [['Date', 'Employee Name', 'Absence Type', 'Duration (Days)', 'Notes'], ...[...logEntries].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(log => [log.date, employeeMap.get(log.employeeId), leaveTypeMap.get(log.leaveTypeId), log.duration, log.notes])];
        const logSheet = XLSX.utils.aoa_to_sheet(logData);
        logSheet['!cols'] = [{wch:12},{wch:25},{wch:18},{wch:15},{wch:40}];
        XLSX.utils.book_append_sheet(wb, logSheet, 'Data Log');
        const setupData = [['Employee List', 'Vacation Allotment', '', 'Absence Types', 'Duration (HH:MM)', 'Color'], ...Array.from({length: Math.max(employees.length, leaveTypes.length)}, (_, i) => [employees[i]?.name, employees[i]?.vacationAllotment, '', leaveTypes[i]?.name, leaveTypes[i]?.durationHHMM, leaveTypes[i]?.color])];
        const setupSheet = XLSX.utils.aoa_to_sheet(setupData);
        setupSheet['!cols'] = [{wch:25},{wch:20},{wch:5},{wch:20},{wch:15},{wch:10}];
        XLSX.utils.book_append_sheet(wb, setupSheet, 'Setup');
        const months = Array.from({length: 12}, (_, i) => new Date(year, i).toLocaleString('default', {month:'short'}));
        const yearlyHeader = ['Employee', ...months, 'Annual Total'];
        const yearlyData = [yearlyHeader, ...employees.map(emp => {
            const monthlyTotals = Array(12).fill(0);
            logEntries.filter(log => log.employeeId === emp.id && new Date(log.date).getFullYear() === year).forEach(log => { monthlyTotals[new Date(log.date).getMonth()] += log.duration; });
            return [emp.name, ...monthlyTotals, monthlyTotals.reduce((a,b)=>a+b,0)];
        })];
        const yearlySheet = XLSX.utils.aoa_to_sheet(yearlyData);
        yearlySheet['!cols'] = [{wch:25},...Array(12).fill({wch:8}),{wch:15}];
        XLSX.utils.book_append_sheet(wb, yearlySheet, 'Yearly Overview');
        XLSX.writeFile(wb, `Team_Leave_Tracker_${year}.xlsx`);
    }

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        loadState();
        navItems.forEach(item => item.addEventListener('click', () => { app.activeTab = item.dataset.tab; saveState(); render(); }));
        document.getElementById('modal-close-btn').addEventListener('click', closeEditModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeEditModal(); });
        render();
    });
    </script>
